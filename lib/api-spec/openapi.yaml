openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cv
    description: CV/resume download and management
  - name: storage
    description: Object storage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /cv:
    get:
      operationId: downloadCv
      tags: [cv]
      summary: Download the current CV/resume PDF
      responses:
        "200":
          description: PDF file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: No CV uploaded yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cv/settings:
    get:
      operationId: getCvSettings
      tags: [cv]
      summary: Get current CV settings
      responses:
        "200":
          description: CV settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CvSettings"
    put:
      operationId: updateCvSettings
      tags: [cv]
      summary: Save the object path of the uploaded CV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvSettingsInput"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CvSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequest"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve a stored object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CvSettings:
      type: object
      properties:
        objectPath:
          type: string
          nullable: true
        fileName:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - updatedAt
    CvSettingsInput:
      type: object
      properties:
        objectPath:
          type: string
        fileName:
          type: string
      required:
        - objectPath
        - fileName
    StorageUploadRequest:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType
    StorageUploadResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          type: object
          properties:
            name:
              type: string
            size:
              type: integer
            contentType:
              type: string
          required:
            - name
            - size
            - contentType
      required:
        - uploadURL
        - objectPath
        - metadata
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
